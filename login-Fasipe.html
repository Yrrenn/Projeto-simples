```html
<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login do Participante - CARREATA FASIPE</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .login-box {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            width: 300px;
            transition: transform 0.4s ease;
        }

        .login-box:hover {
            transform: translateY(-5px);
        }

        .logo {
            display: block;
            margin: 0 auto 20px auto;
            width: 65%;
            height: auto;
        }

        h2 {
            text-align: center;
            margin-bottom: 10px;
        }

        .evento {
            text-align: center;
            color: #666;
            margin-bottom: 15px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
        }

        input:focus {
            outline: none;
            border-color: #046d16;
            box-shadow: 0 0 5px rgba(4, 109, 22, 0.5);
        }

        button {
            width: 100%;
            padding: 10px;
            background-color: #219909;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background-color: #046d16;
        }

        .mensagem {
            text-align: center;
            margin-top: 15px;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <div class="login-box">

        <img src="https://duedigital.com.br/wp-content/uploads/2016/02/LOGO-FASIPE.png"
            alt="Logo FASIPE"
            class="logo">

        <h2>Login</h2>

        <div class="evento">Evento da Faculdade</div>
        <div class="evento">Carreata FASIPE</div>

        <form>
            <input type="text" placeholder="Usuário" required>

            <input type="password" placeholder="Senha" required>

            <button type="button" onclick="entrar()">Entrar</button>
        </form>

        <div class="mensagem" id="mensagem"></div>

    </div>

    <script>
        function entrar() {
            document.getElementById("mensagem").innerHTML =
                "Login realizado com sucesso!";
        }
    </script>

</body>

</html>
```
