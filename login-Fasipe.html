<!DOCTYPE html>

<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Login do particpante - CARREATA FASIPE </title>


    <style>

        body {
            font-family: Arial, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .login-box {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            width: 300px;
        }


		.logo {
  		display: block;
    		margin: 0 auto 20px auto; 
    		width: 50%;             
    		height: auto; 
            
}


        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 10px;
            background-color: #007BFF;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background-color: #0056b3;
        }

        .evento {
            text-align: center;
            color: #666;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>

    <div class="login-box">

	<img src="https://duedigital.com.br/wp-content/uploads/2016/02/LOGO-FASIPE.png"
     alt="Logo FASIPE"
     class="logo"
     width="100"
     >

        <h2>Login</h2>
        <div class="evento">Evento da Faculdade</div>

        <form>
            <input type="text" placeholder="Usuário" required>
            <input type="password" placeholder="Senha" required>
            <button type="submit">Entrar</button>
        </form>
    </div>

</body>
</html>
